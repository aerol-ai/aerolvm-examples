name: Build and Publish Interview App

on:
  push:
    branches:
      - main
    # Only trigger this workflow if files in the interview-app directory change
    paths:
      - 'customer-facing/edtech-coding-interviews/interview-app/**'
  pull_request:
    paths:
      - 'customer-facing/edtech-coding-interviews/interview-app/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-interview-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Context needs to point to the directory containing the Dockerfile
          context: ./customer-facing/edtech-coding-interviews/interview-app
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
