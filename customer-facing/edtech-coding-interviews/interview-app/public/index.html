<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aerol.ai Interview App | Multi-Language Sandbox</title>
  <link rel="stylesheet" href="styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Monaco Loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>

<body>
  <div class="app-container">
    <header class="navbar">
      <div class="logo">💻 Multi-Language Interview App</div>
      <div class="nav-controls">
        <select id="languageSelect" class="lang-select">
          <option value="python" selected>Python 3</option>
          <option value="javascript">Node.js</option>
          <option value="rust">Rust</option>
          <option value="go">Go</option>
          <option value="cpp">C++</option>
          <option value="java">Java</option>
          <option value="ruby">Ruby</option>
          <option value="php">PHP</option>
          <option value="bash">Bash</option>
          <option value="perl">Perl</option>
        </select>
        <button id="runBtn" class="run-button">Run Code</button>
      </div>
    </header>

    <div class="workspace">
      <!-- Left side: Monaco Editor -->
      <div class="panel left-panel">
        <div class="editor-header">
          <span class="file-name" id="fileNameDisplay">main.py</span>
        </div>
        <div id="monaco-container" class="editor-container"></div>
      </div>

      <!-- Right side: Terminal Output -->
      <div class="panel right-panel">
        <div class="terminal-header">
          <span class="tab active">Terminal</span>
          <span id="statusIndicator" class="status idle">Idle</span>
        </div>
        <div class="terminal-body" id="terminalOutput">
          <div class="welcome-msg">Select a language and click "Run Code" to execute.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
